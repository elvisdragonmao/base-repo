name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Deploy into gh-pages
        run: |
          git fetch origin build || true
          git worktree add ../gh-pages gh-pages || git checkout --orphan gh-pages

          # 清空你不需要的舊檔案
          rm -rf ../gh-pages/_astro ../gh-pages/img

          # 複製新的 build 輸出
          cp -r dist/* ../deploy/

          cd ../deploy
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: Deploy main site" || echo "No changes to commit"
          git push origin build

      - name: Trigger Deploy Final Website workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref": "build"}'
